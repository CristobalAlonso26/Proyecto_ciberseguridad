<section class="panel">
  <h3>Ranking global CWE</h3>
  @if (!ranking.length) {
    <p class="empty">No hay debilidades comunes registradas.</p>
  } @else {
    <ol>
      @for (item of visibleRanking; track item.cwe; let i = $index) {
        <li [class.top]="i === 0">
          <div class="left">
            <span>{{ item.cwe }}</span>
            <div class="bar"><i [style.width]="width(item.count)"></i></div>
          </div>
          <div class="right">
            <strong>{{ item.count }}</strong>
            <small>{{ item.repos_count ?? 0 }} repos</small>
          </div>
        </li>
      }
    </ol>
    @if (hasMore) {
      <button type="button" class="toggle-btn" (click)="toggle()">
        {{ showAll ? 'Mostrar menos' : 'Mostrar todos (' + ranking.length + ')' }}
      </button>
    }
  }
</section>
