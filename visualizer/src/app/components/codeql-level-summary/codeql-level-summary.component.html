<section class="panel">
  <h3>CodeQL por nivel</h3>
  @if (!entries.length) {
    <p class="empty">Sin issues CodeQL por nivel.</p>
  } @else {
    <table>
      <thead><tr><th>Nivel</th><th>Conteo</th></tr></thead>
      <tbody>
        @for (entry of entries; track entry.level) {
          <tr><td>{{ entry.level }}</td><td>{{ entry.count }}</td></tr>
        }
      </tbody>
    </table>
  }
</section>
