<section class="panel">
  <h3>CodeQL por nivel</h3>
  @if (!entries.length) {
    <p class="empty">Sin issues CodeQL por nivel.</p>
  } @else {
    <div class="chips">
      @for (entry of entries; track entry.level) {
        <article class="chip" [title]="entry.level + ': ' + entry.count">
          <span class="level">{{ entry.level }}</span>
          <strong>{{ entry.count }}</strong>
        </article>
      }
    </div>
  }
</section>
