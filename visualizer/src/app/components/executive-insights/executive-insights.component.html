<section class="panel">
  <h3>Executive Insights</h3>
  <p class="subtitle">Resumen táctico de señales de riesgo y remediación.</p>
  @if (!insights.length) {
    <p class="empty">No hay insights disponibles.</p>
  } @else {
    <div class="insights-grid">
      @for (item of insights; track item.label) {
        <article class="insight-card" [class]="'insight-card ' + (item.accent || 'cyan')">
          <p class="label">{{ item.label }}</p>
          <p class="value">{{ item.value }}</p>
          <p class="secondary">{{ item.secondary || '' }}</p>
        </article>
      }
    </div>
  }
</section>
