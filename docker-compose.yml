# ============================================================
# Security Vulnerability Analysis Pipeline — Docker Compose
# ============================================================
# Servicios:
#   miner      → Extrae repos, ejecuta CodeQL/Syft/Grype
#   analyzer   → Jupyter Lab para analisis exploratorio
#   visualizer → Dashboard web de resultados
#
# Uso:
#   docker compose run --rm miner              # Ejecutar miner una vez
#   docker compose up analyzer                 # Levantar Jupyter Lab
#   docker compose up visualizer               # Levantar dashboard
#   docker compose up -d analyzer visualizer   # Ambos en background
# ============================================================

services:

  # ----------------------------------------------------------
  # Miner: extraccion y analisis automatico de repositorios
  # ----------------------------------------------------------
  miner:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command: uv run python -m miner
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_ORG: ${GITHUB_ORG}
      REPO_LIMIT: ${REPO_LIMIT:-50}
      REPO_VISIBILITY: ${REPO_VISIBILITY:-public}
      SKIP_ARCHIVED: ${SKIP_ARCHIVED:-true}
      CLONE_DEPTH: ${CLONE_DEPTH:-none}
      CLONE_WORKERS: ${CLONE_WORKERS:-3}
    volumes:
      - .:/workspace:cached
    restart: "no"

  # ----------------------------------------------------------
  # Analyzer: Jupyter Lab para analisis exploratorio
  # ----------------------------------------------------------
  analyzer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --notebook-dir=/workspace
    volumes:
      - .:/workspace:cached
    ports:
      - "8888:8888"
    restart: unless-stopped

  # ----------------------------------------------------------
  # Visualizer: dashboard Angular con ng serve
  # ----------------------------------------------------------
  visualizer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace/visualizer
    command: >
      bash -c "
        npm install &&
        if [ ! -f src/assets/analysis.json ]; then
          echo 'Copying analysis.json...' &&
          bash /workspace/scripts/prepare_visualizer_data.sh;
        fi &&
        npx ng serve --host 0.0.0.0 --port 4200
      "
    volumes:
      - .:/workspace:cached
    ports:
      - "4200:4200"
    restart: unless-stopped
    profiles:
      - visualizer
